services:
  backend-id3tags:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8000
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-https://id3tags.com}
      API_SHARED_TOKEN: ${API_SHARED_TOKEN}
    restart: unless-stopped

  frontend-id3tags:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api/mp3}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://id3tags.com}
        NEXT_PUBLIC_SITE_LOCALE: ${NEXT_PUBLIC_SITE_LOCALE:-en}
        SITE_VERIFICATION_GOOGLE: ${SITE_VERIFICATION_GOOGLE:-}
        SITE_VERIFICATION_BING: ${SITE_VERIFICATION_BING:-}
        GOOGLE_ANALYTICS_ID: ${GOOGLE_ANALYTICS_ID:-}
    environment:
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api/mp3}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://id3tags.com}
      NEXT_PUBLIC_SITE_LOCALE: ${NEXT_PUBLIC_SITE_LOCALE:-en}
      BACKEND_INTERNAL_API_URL: ${BACKEND_INTERNAL_API_URL:-http://backend-id3tags:8000}
      API_SHARED_TOKEN: ${API_SHARED_TOKEN}
      SITE_VERIFICATION_GOOGLE: ${SITE_VERIFICATION_GOOGLE:-}
      SITE_VERIFICATION_BING: ${SITE_VERIFICATION_BING:-}
      GOOGLE_ANALYTICS_ID: ${GOOGLE_ANALYTICS_ID:-}
    depends_on:
      - backend-id3tags
    restart: unless-stopped
