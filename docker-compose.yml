services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mp3-cover-backend
    environment:
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8000
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    container_name: mp3-cover-frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      PORT: 3000
    depends_on:
      - backend
    ports:
      - "3000:3000"
    restart: unless-stopped
