services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mp3-cover-backend
    environment:
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8000
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:3000}
      API_SHARED_TOKEN: ${API_SHARED_TOKEN}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api/mp3}
        NEXT_PUBLIC_SITE_LOCALE: ${NEXT_PUBLIC_SITE_LOCALE:-ru}
        SITE_VERIFICATION_GOOGLE: ${SITE_VERIFICATION_GOOGLE:-}
        SITE_VERIFICATION_BING: ${SITE_VERIFICATION_BING:-}
        GOOGLE_ANALYTICS_ID: ${GOOGLE_ANALYTICS_ID:-}
    container_name: mp3-cover-frontend
    environment:
      PORT: 3000
      BACKEND_INTERNAL_API_URL: ${BACKEND_INTERNAL_API_URL:-http://backend:8000}
      API_SHARED_TOKEN: ${API_SHARED_TOKEN}
      SITE_VERIFICATION_GOOGLE: ${SITE_VERIFICATION_GOOGLE:-}
      SITE_VERIFICATION_BING: ${SITE_VERIFICATION_BING:-}
      GOOGLE_ANALYTICS_ID: ${GOOGLE_ANALYTICS_ID:-}
    depends_on:
      - backend
    restart: unless-stopped
